name: Deploy Editorial to VPS
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync to server
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.VPS_SSH_PORT }}" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='docker-compose.prod.yml' \
            --exclude='docker-compose.yml' \
            --exclude='data/' \
            --exclude='public/covers/' \
            --exclude='public/avatars/' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/projects/immigrants-data/

      - name: Rebuild & restart
        run: |
          ssh -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /root/projects/immigrants-data && docker compose -f docker-compose.prod.yml up -d --build app"
