<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Immigrants News — Christmas 2025</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1280px;
            height: 720px;
            overflow: hidden;
            background: #0a0a1a;
            font-family: 'Inter', sans-serif;
        }

        .scene {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center bottom, #1a0a2e 0%, #0a0a1a 60%, #050510 100%);
        }

        /* Stars */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.2;
                transform: scale(0.8);
            }

            100% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* Snowflakes */
        .snowflake {
            position: absolute;
            color: white;
            font-size: 14px;
            opacity: 0;
            animation: snowfall linear infinite;
            pointer-events: none;
        }

        @keyframes snowfall {
            0% {
                opacity: 0;
                transform: translateY(-20px) rotate(0deg);
            }

            10% {
                opacity: 0.8;
            }

            90% {
                opacity: 0.6;
            }

            100% {
                opacity: 0;
                transform: translateY(740px) rotate(360deg);
            }
        }

        /* Main content */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
            padding: 40px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 22px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeInUp 1.5s ease 0.5s forwards;
        }

        .tree-container {
            margin: 0 auto 30px;
            opacity: 0;
            animation: fadeInScale 2s ease 1s forwards;
        }

        .tree {
            font-size: 80px;
            filter: drop-shadow(0 0 30px rgba(0, 200, 100, 0.5));
        }

        .ornament {
            display: inline-block;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            0% {
                filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.3));
            }

            100% {
                filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8));
            }
        }

        .greeting {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 52px;
            line-height: 1.2;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF6347, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 300% 300%;
            animation: fadeInUp 1.5s ease 2s forwards, shimmer 3s ease infinite;
            opacity: 0;
            margin-bottom: 15px;
        }

        @keyframes shimmer {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .subtitle {
            font-size: 20px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            max-width: 700px;
            margin: 0 auto 25px;
            opacity: 0;
            animation: fadeInUp 1.5s ease 2.8s forwards;
        }

        .team {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 18px;
            color: rgba(255, 215, 0, 0.8);
            opacity: 0;
            animation: fadeInUp 1.5s ease 3.5s forwards;
        }

        .year {
            font-family: 'Playfair Display', serif;
            font-size: 90px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.05);
            position: absolute;
            bottom: 20px;
            right: 40px;
            opacity: 0;
            animation: fadeInUp 2s ease 4s forwards;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Aurora effect */
        .aurora {
            position: absolute;
            top: -50px;
            left: -100px;
            width: 150%;
            height: 200px;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(0, 200, 100, 0.08) 20%,
                    rgba(0, 100, 200, 0.12) 40%,
                    rgba(100, 0, 200, 0.08) 60%,
                    rgba(200, 0, 100, 0.06) 80%,
                    transparent 100%);
            filter: blur(40px);
            animation: aurora 8s ease-in-out infinite alternate;
        }

        @keyframes aurora {
            0% {
                transform: translateX(-100px) skewY(-2deg);
            }

            100% {
                transform: translateX(100px) skewY(2deg);
            }
        }
    </style>
</head>

<body>
    <div class="scene">
        <div class="aurora"></div>
        <div class="stars" id="stars"></div>
        <div id="snow"></div>

        <div class="content">
            <div class="logo">The Immigrants News</div>

            <div class="tree-container">
                <div class="tree">
                    <span class="ornament">🎄</span>
                </div>
            </div>

            <div class="greeting">Merry Christmas!</div>

            <div class="subtitle">
                Wishing all immigrants, expats, and global citizens<br>
                a season of warmth, belonging, and new beginnings.<br>
                Wherever you are — you are home.
            </div>

            <div class="team">
                — From the Editorial Team at The Immigrants News
            </div>
        </div>

        <div class="year">2025</div>
    </div>

    <script>
        // Generate stars
        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 60 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (1.5 + Math.random() * 2) + 's';
            star.style.width = star.style.height = (1 + Math.random() * 3) + 'px';
            starsEl.appendChild(star);
        }

        // Generate snowflakes
        const snowEl = document.getElementById('snow');
        const flakes = ['❄', '❅', '❆', '✦', '·'];
        for (let i = 0; i < 50; i++) {
            const sf = document.createElement('div');
            sf.className = 'snowflake';
            sf.textContent = flakes[Math.floor(Math.random() * flakes.length)];
            sf.style.left = Math.random() * 100 + '%';
            sf.style.fontSize = (8 + Math.random() * 16) + 'px';
            sf.style.animationDelay = Math.random() * 8 + 's';
            sf.style.animationDuration = (5 + Math.random() * 10) + 's';
            snowEl.appendChild(sf);
        }
    </script>
</body>

</html>
